apiVersion: v1
kind: ConfigMap
metadata:
  name: caerora-config
data:
  # ---- Django ----
  DJANGO_SETTINGS_MODULE: "caerora.settings.prod"
  DJANGO_DEBUG: "0"
  # The backend pod runs migrate + ensure_superuser on startup (single replica,
  # so no races). Set to "0" only if you add a dedicated migrate Job and scale
  # the backend beyond one replica.
  RUN_STARTUP_TASKS: "1"
  # Static is baked into the image at build time and served by WhiteNoise, so we
  # skip collectstatic at startup (no slow writes to a networked RWX volume).
  COLLECT_STATIC: "0"
  # Seed the demo catalog on startup. seed_demo is idempotent (it skips once any
  # product exists), so this safely populates an empty store on first rollout and
  # is a no-op thereafter. Real products, once added, always take precedence.
  SEED_ON_START: "1"
  # Behind ingress-nginx (TLS terminated upstream).
  SESSION_COOKIE_SECURE: "1"
  CSRF_COOKIE_SECURE: "1"
  SECURE_HSTS_SECONDS: "0"

  # ---- Database (password lives in the Secret) ----
  POSTGRES_DB: "caerora"
  POSTGRES_USER: "caerora"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"

  # ---- Redis / Celery ----
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"

  # ---- Email ----
  EMAIL_FROM: "Caerora <hello@caerora.com>"
  ADMIN_NOTIFICATION_EMAIL: "orders@caerora.com"

  # ---- Stripe (non-secret) ----
  STRIPE_DEFAULT_CURRENCY: "eur"

  # ---- Superuser (password lives in the Secret) ----
  DJANGO_SUPERUSER_USERNAME: "admin"
  DJANGO_SUPERUSER_EMAIL: "admin@caerora.com"

  # ---- Frontend SSR (server-to-server, in-cluster) ----
  INTERNAL_API_BASE_URL: "http://backend:8000/api"

  # ---- Per-environment values (overridden in overlays) ----
  DJANGO_ALLOWED_HOSTS: "caerora.com,www.caerora.com,backend"
  SITE_URL: "https://caerora.com"
  FRONTEND_ORIGIN: "https://caerora.com"
  BACKEND_ORIGIN: "https://caerora.com"
  MEDIA_PUBLIC_BASE_URL: "https://caerora.com"

upstream backend_app {
    server backend:8000;
}

upstream frontend_app {
    server frontend:3000;
}

# Single-domain reverse proxy used in Kubernetes (one host -> one Service).
# Path routing: API/admin/django-static -> backend (WhiteNoise serves static),
# /media -> the shared media volume, everything else -> the Next.js storefront.
# TLS is terminated upstream by ingress-nginx, which forwards X-Forwarded-Proto
# so Django sees the real scheme.
server {
    listen 8080;
    server_name _;
    client_max_body_size 25M;

    location /django-static/ {
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 7d;
    }

    location /api/ {
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /admin/ {
        proxy_pass http://backend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

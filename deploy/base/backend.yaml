apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  # Single replica: startup migrations are handled by the migrate Job, but
  # keeping one replica avoids any media/admin write contention. Scale with care.
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: caerora-backend:latest
          # Use args (not command) so the image ENTRYPOINT (entrypoint.sh) runs.
          args:
            - gunicorn
            - caerora.wsgi:application
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "3"
            - --timeout
            - "120"
          # The image ENTRYPOINT runs first: wait for Postgres, migrate and
          # ensure the superuser (collectstatic is baked in at build time), then
          # exec gunicorn. WhiteNoise serves /django-static from the image.
          envFrom:
            - configMapRef:
                name: caerora-config
            - secretRef:
                name: caerora-secrets
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: media
              mountPath: /app/media
          # Startup runs migrate + ensure_superuser before gunicorn binds :8000,
          # which can take a while on first boot. Gate liveness/readiness behind
          # a generous startup budget (up to ~6 min).
          startupProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 10
            failureThreshold: 36
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media

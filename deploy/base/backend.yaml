apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  # Single replica: startup migrations are handled by the migrate Job, but
  # keeping one replica avoids any media/admin write contention. Scale with care.
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: caerora-backend:latest
          command:
            - gunicorn
            - caerora.wsgi:application
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "3"
            - --timeout
            - "120"
          envFrom:
            - configMapRef:
                name: caerora-config
            - secretRef:
                name: caerora-secrets
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: static
              mountPath: /app/staticfiles
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media
        - name: static
          persistentVolumeClaim:
            claimName: static

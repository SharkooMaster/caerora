apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: caerora
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "200m"
spec:
  ingressClassName: caerora-nginx
  tls:
    - hosts:
        - caerora.com
      secretName: caerora-tls
  rules:
    - host: caerora.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8080

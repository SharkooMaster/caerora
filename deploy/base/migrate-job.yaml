apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  annotations:
    # Run before the main sync so the DB schema/static are ready, and replace
    # any previous hook Job on each sync.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: caerora-backend:latest
          # The image ENTRYPOINT waits for Postgres, then execs these args.
          args:
            - bash
            - -lc
            - >-
              python manage.py migrate --noinput &&
              python manage.py collectstatic --noinput &&
              (python manage.py ensure_superuser || true)
          envFrom:
            - configMapRef:
                name: caerora-config
            - secretRef:
                name: caerora-secrets
          volumeMounts:
            - name: static
              mountPath: /app/staticfiles
            - name: media
              mountPath: /app/media
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
      volumes:
        - name: static
          persistentVolumeClaim:
            claimName: static
        - name: media
          persistentVolumeClaim:
            claimName: media

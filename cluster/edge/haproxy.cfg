global
    log stdout format raw local0 info
    maxconn 8192

defaults
    log global
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout tunnel 1h

#############################################
# :443  TLS passthrough, routed by SNI
#  - mail* SNIs  -> mailcow VM (terminates its own TLS, unchanged)
#  - everything else -> caerora ingress-nginx (192.168.50.75)
#############################################
frontend https_in
    bind *:443
    mode tcp
    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }
    use_backend mailcow_https if { req_ssl_sni -i mail.caerora.com }
    use_backend mailcow_https if { req_ssl_sni -i autodiscover.caerora.com }
    use_backend mailcow_https if { req_ssl_sni -i autoconfig.caerora.com }
    use_backend mailcow_https if { req_ssl_sni -i mta-sts.caerora.com }
    default_backend web_https

backend mailcow_https
    mode tcp
    server mailcow 192.168.50.60:443

backend web_https
    mode tcp
    server ingress 192.168.50.75:443

#############################################
# :80  HTTP, routed by Host header
#  (ACME http-01 challenges + http->https redirects)
#############################################
frontend http_in
    bind *:80
    mode http
    acl host_mail hdr(host) -i mail.caerora.com
    acl host_mail hdr(host) -i autodiscover.caerora.com
    acl host_mail hdr(host) -i autoconfig.caerora.com
    acl host_mail hdr(host) -i mta-sts.caerora.com
    use_backend mailcow_http if host_mail
    default_backend web_http

backend mailcow_http
    mode http
    server mailcow 192.168.50.60:80

backend web_http
    mode http
    server ingress 192.168.50.75:80

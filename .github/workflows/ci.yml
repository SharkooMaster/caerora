name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Django checks
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: caerora.settings.dev
          DJANGO_SECRET_KEY: ci-secret-key
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://dev.caerora.com/api
          NEXT_PUBLIC_SITE_URL: https://dev.caerora.com
        run: npm run build

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          curl -sSfL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/
      - name: Build overlays
        run: |
          kustomize build deploy/overlays/dev > /dev/null
          kustomize build deploy/overlays/prod > /dev/null

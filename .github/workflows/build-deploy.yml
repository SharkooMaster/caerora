name: Build & Deploy

on:
  push:
    branches: [main, develop]

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=prod" >> "$GITHUB_OUTPUT"
            echo "overlay=deploy/overlays/prod" >> "$GITHUB_OUTPUT"
            echo "site_url=https://caerora.com" >> "$GITHUB_OUTPUT"
            echo "api_base=https://caerora.com/api" >> "$GITHUB_OUTPUT"
          else
            echo "name=dev" >> "$GITHUB_OUTPUT"
            echo "overlay=deploy/overlays/dev" >> "$GITHUB_OUTPUT"
            echo "site_url=https://dev.caerora.com" >> "$GITHUB_OUTPUT"
            echo "api_base=https://dev.caerora.com/api" >> "$GITHUB_OUTPUT"
          fi
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: tag
        run: echo "value=${{ steps.env.outputs.name }}-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.env.outputs.owner_lc }}/caerora-backend:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.env.outputs.owner_lc }}/caerora-frontend:${{ steps.tag.outputs.value }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.env.outputs.api_base }}
            NEXT_PUBLIC_SITE_URL=${{ steps.env.outputs.site_url }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_GA4_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_GA4_MEASUREMENT_ID || 'G-VFEVSLHKG0' }}
            NEXT_PUBLIC_META_PIXEL_ID=${{ vars.NEXT_PUBLIC_META_PIXEL_ID }}
            NEXT_PUBLIC_TIKTOK_PIXEL_ID=${{ vars.NEXT_PUBLIC_TIKTOK_PIXEL_ID }}
            NEXT_PUBLIC_GOOGLE_ADS_ID=${{ vars.NEXT_PUBLIC_GOOGLE_ADS_ID || 'AW-18284609416' }}
            NEXT_PUBLIC_GOOGLE_ADS_PURCHASE_LABEL=${{ vars.NEXT_PUBLIC_GOOGLE_ADS_PURCHASE_LABEL || '0vu6CJH70sccEIj_445E' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kustomize
        run: |
          curl -sSfL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump image tags in overlay
        working-directory: ${{ steps.env.outputs.overlay }}
        run: |
          kustomize edit set image caerora-backend=${{ env.REGISTRY }}/${{ steps.env.outputs.owner_lc }}/caerora-backend:${{ steps.tag.outputs.value }}
          kustomize edit set image caerora-frontend=${{ env.REGISTRY }}/${{ steps.env.outputs.owner_lc }}/caerora-frontend:${{ steps.tag.outputs.value }}

      - name: Commit & push manifest bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest changes."
            exit 0
          fi
          git add ${{ steps.env.outputs.overlay }}/kustomization.yaml
          git commit -m "ci: deploy ${{ steps.env.outputs.name }} ${{ steps.tag.outputs.value }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

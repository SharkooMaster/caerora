apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: caerora-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SharkooMaster/caerora.git
    targetRevision: develop
    path: deploy/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: caerora-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: caerora-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SharkooMaster/caerora.git
    targetRevision: main
    path: deploy/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: caerora-prod
  syncPolicy:
    # Auto-sync prod too; set `automated: null` (or remove) to require a manual
    # "Sync" click in the Argo CD UI before prod changes go live.
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
